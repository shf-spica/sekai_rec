<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SEKAI recorder - マイページ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;600;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
  <link rel="stylesheet" href="/records.css?v=20260326c">
</head>

<body>
  <div class="app-container">
    <header class="app-header">
      <div class="mypage-header">
        <div class="mypage-user">
          <span class="auth-user" id="auth-user"></span>
          <div class="records-count" id="records-count"></div>
        </div>
        <div class="mypage-title">
          <h1 class="app-title">
            <a href="/index.html" class="title-link">SEKAI recorder</a>
          </h1>
          <div class="mypage-actions">
            <a href="/index.html" class="btn btn-ghost btn-sm" id="to-ocr-link">OCRする</a>
            <button type="button" class="btn btn-ghost btn-sm" id="manual-entry-link">手動入力</button>
            <button type="button" class="btn btn-ghost btn-sm" id="auth-logout-btn" style="display: none;">ログアウト</button>
          </div>
        </div>
      </div>
    </header>

    <main class="main-content records-main">
      <div id="records-login-required" class="records-message" style="display: none;">
        <p>ログインしてください。</p>
      </div>
      <div id="records-loading" class="records-message">
        <p>読み込み中...</p>
      </div>
      <div id="records-content" class="records-content" style="display: none;">
        <section class="ingest-panel" id="ingest-panel" style="display: none;" aria-labelledby="ingest-panel-title">
          <h2 class="ingest-panel-title" id="ingest-panel-title">連携トークン</h2>
          <div class="ingest-panel-actions">
            <button type="button" class="btn btn-primary btn-sm" id="ingest-issue-btn">発行</button>
          </div>
          <ul class="ingest-token-list" id="ingest-token-list"></ul>
        </section>
        <div class="records-level-filter-wrap" id="records-level-filter-wrap" style="display: none;" aria-hidden="true">
          <label class="records-level-filter-label" for="records-level-select">Lv.で絞り込み</label>
          <select id="records-level-select" class="records-level-select">
            <option value="all">すべて</option>
          </select>
          <button type="button" class="btn btn-ghost btn-sm records-refresh-btn" id="records-refresh-btn">更新</button>
        </div>
        <div id="records-groups"></div>
      </div>
      <div id="records-empty" class="records-message" style="display: none;">
        <p>記録がまだありません。OCRでリザルトを読み取って保存しましょう。</p>
        <a href="/index.html" class="btn btn-primary">OCRする</a>
      </div>
    </main>

    <!-- 内訳モーダル -->
    <div class="record-detail-modal" id="record-detail-modal" style="display: none;" aria-hidden="true">
      <div class="record-detail-backdrop" id="record-detail-backdrop"></div>
      <div class="record-detail-content">
        <div class="record-detail-header">
          <img class="record-detail-jacket" id="record-detail-jacket" src="" alt="">
          <div>
            <h3 class="record-detail-title" id="record-detail-title"></h3>
            <p class="record-detail-meta" id="record-detail-meta"></p>
          </div>
        </div>
        <div class="record-detail-body">
          <div class="record-detail-point" id="record-detail-point"></div>
          <div class="record-detail-time" id="record-detail-time"></div>
          <div class="record-detail-judgments" id="record-detail-judgments"></div>
        </div>
        <button type="button" class="record-detail-delete" id="record-detail-delete" style="display: none;">この記録を削除</button>
        <button type="button" class="record-detail-add-manual" id="record-detail-add-manual" style="display: none;">記録を追加</button>
        <button type="button" class="record-detail-close" id="record-detail-close">閉じる</button>
      </div>
    </div>
  </div>

  <!-- 手動入力モーダル（マイページ内で完結） -->
  <div class="manual-modal" id="manual-modal" style="display: none;" aria-hidden="true">
    <div class="manual-modal-backdrop" id="manual-modal-backdrop"></div>
    <div class="manual-modal-content">
      <h3 class="manual-modal-title">手動入力</h3>
      <label class="manual-field">
        <span>曲名で検索</span>
        <input type="text" id="manual-search" placeholder="曲名を入力" autocomplete="off">
      </label>
      <div class="manual-search-results" id="manual-search-results"></div>
      <div class="manual-selected" id="manual-selected" style="display: none;">
        <span class="manual-selected-label">選択中:</span>
        <span id="manual-selected-title"></span>
      </div>
      <label class="manual-field">
        <span>難易度</span>
        <select id="manual-difficulty">
          <option value="expert">EXPERT</option>
          <option value="master" selected>MASTER</option>
          <option value="append">APPEND</option>
        </select>
      </label>
      <div class="manual-judgments">
        <label class="manual-judgment"><span>GREAT</span><input type="number" id="manual-great" min="0" value="0"></label>
        <label class="manual-judgment"><span>GOOD</span><input type="number" id="manual-good" min="0" value="0"></label>
        <label class="manual-judgment"><span>BAD</span><input type="number" id="manual-bad" min="0" value="0"></label>
        <label class="manual-judgment"><span>MISS</span><input type="number" id="manual-miss" min="0" value="0"></label>
      </div>
      <p class="manual-error" id="manual-error"></p>
      <div class="manual-modal-actions">
        <button type="button" class="btn btn-ghost" id="manual-modal-cancel">キャンセル</button>
        <button type="button" class="btn btn-primary" id="manual-submit">記録を保存</button>
      </div>
    </div>
  </div>

  <!-- 発行直後のトークン表示（再表示不可） -->
  <div class="ingest-token-reveal" id="ingest-token-reveal" style="display: none;" aria-hidden="true">
    <div class="ingest-token-reveal-backdrop" id="ingest-token-reveal-backdrop"></div>
    <div class="ingest-token-reveal-content">
      <h3 class="ingest-token-reveal-title">トークン</h3>
      <input type="text" class="ingest-token-reveal-input" id="ingest-token-reveal-input" readonly autocomplete="off" spellcheck="false">
      <div class="ingest-token-reveal-actions">
        <button type="button" class="btn btn-primary" id="ingest-token-copy-btn">コピー</button>
        <button type="button" class="btn btn-ghost" id="ingest-token-reveal-close">閉じる</button>
      </div>
    </div>
  </div>

  <script type="module" src="/records.js?v=20260326c"></script>
</body>

</html>
