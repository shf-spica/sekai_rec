<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SEKAI recorder - マイページ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;600;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
  <link rel="stylesheet" href="/records.css">
</head>

<body>
  <div class="app-container">
    <header class="app-header">
      <div class="mypage-header">
        <div class="mypage-user">
          <span class="auth-user" id="auth-user"></span>
        </div>
        <div class="mypage-title">
          <h1 class="app-title">
            <a href="/index.html" class="title-link">SEKAI recorder</a>
          </h1>
          <div class="mypage-actions">
            <a href="/index.html" class="btn btn-ghost btn-sm" id="to-ocr-link">OCRする</a>
            <a href="/index.html?manual=1" class="btn btn-ghost btn-sm" id="manual-entry-link">手動入力</a>
            <button type="button" class="btn btn-ghost btn-sm" id="auth-logout-btn" style="display: none;">ログアウト</button>
          </div>
        </div>
      </div>
    </header>

    <main class="main-content records-main">
      <div id="records-login-required" class="records-message" style="display: none;">
        <p>ログインしてください。</p>
      </div>
      <div id="records-loading" class="records-message">
        <p>読み込み中...</p>
      </div>
      <div id="records-content" class="records-content" style="display: none;">
        <div id="records-groups"></div>
      </div>
      <div id="records-empty" class="records-message" style="display: none;">
        <p>記録がまだありません。OCRでリザルトを読み取って保存しましょう。</p>
        <a href="/index.html" class="btn btn-primary">OCRする</a>
      </div>
    </main>

    <!-- 内訳モーダル -->
    <div class="record-detail-modal" id="record-detail-modal" style="display: none;" aria-hidden="true">
      <div class="record-detail-backdrop" id="record-detail-backdrop"></div>
      <div class="record-detail-content">
        <div class="record-detail-header">
          <img class="record-detail-jacket" id="record-detail-jacket" src="" alt="">
          <div>
            <h3 class="record-detail-title" id="record-detail-title"></h3>
            <p class="record-detail-meta" id="record-detail-meta"></p>
          </div>
        </div>
        <div class="record-detail-body">
          <div class="record-detail-point" id="record-detail-point"></div>
          <div class="record-detail-time" id="record-detail-time"></div>
          <div class="record-detail-judgments" id="record-detail-judgments"></div>
        </div>
        <button type="button" class="record-detail-delete" id="record-detail-delete" style="display: none;">この記録を削除</button>
        <button type="button" class="record-detail-ap" id="record-detail-ap" style="display: none;">APとして記録</button>
        <button type="button" class="record-detail-close" id="record-detail-close">閉じる</button>
      </div>
    </div>
  </div>

  <script type="module" src="/records.js"></script>
</body>

</html>
