<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="SEKAI recorder 案内">
  <title>SEKAI recorder — 案内</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;600;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
</head>

<body>
  <div class="app-container">
    <header class="app-header">
      <h1 class="app-title">SEKAI recorder</h1>
      <p class="app-subtitle">案内・使い方（このページは自由に編集してください）</p>
      <div class="header-actions" style="flex-wrap: wrap; gap: 0.5rem;">
        <a href="/ocr.html" class="btn btn-primary btn-sm">リザルトを読み取る（OCR）</a>
        <a href="/records/me" class="btn btn-ghost btn-sm">マイページへ</a>
      </div>
    </header>

    <main class="main-content" style="max-width: 40rem; margin: 0 auto;">
      <section class="upload-section" style="border-style: dashed;">
        <h2 class="section-title" style="margin-bottom: 0.75rem;">使い方</h2>
        <p style="color: var(--text-secondary, #888); line-height: 1.6;">
          ここに手順や注意事項を書いてください。HTML のまま編集できます。
        </p>
        <ul style="margin-top: 1rem; line-height: 1.7; padding-left: 1.25rem;">
          <li><strong>OCR</strong>：スクリーンショットからスコアを読み取ります → <a href="/ocr.html">/ocr.html</a></li>
          <li><strong>マイページ</strong>：記録の一覧・手動入力など → <a href="/records/me">/records/me</a>（未ログイン時は既定ユーザーへ移動します）</li>
        </ul>
      </section>
    </main>

    <footer class="app-footer">
      <p>このファイルは <code>home.html</code> です。ルート <code>/</code> はバックエンドなら直表示、nginx 等で <code>index.html</code> が返る場合は <code>/home.html</code> へリダイレクトされます。</p>
    </footer>
  </div>
</body>

</html>
