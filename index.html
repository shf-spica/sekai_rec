<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="プロセカのリザルトを記録・閲覧するツール">
  <title>SEKAI recorder</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;600;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
</head>

<body>
  <div class="app-container">
    <header class="app-header">
      <h1 class="app-title">SEKAI recorder</h1>
      <p class="app-subtitle">プロセカのリザルトを記録・閲覧するツール</p>
      <div class="header-actions">
        <div class="model-status" id="model-status">
          <span class="status-dot ready"></span>
          <span id="model-status-text">ブラウザOCR 優先（失敗時のみサーバーOCRへフォールバック）</span>
        </div>
        <div class="auth-area" id="auth-area">
          <span class="auth-user" id="auth-user" style="display: none;"></span>
          <!-- 手動入力はマイページ側へ移動 -->
          <a href="records.html" class="btn btn-ghost btn-sm" id="records-link">マイページ</a>
          <button type="button" class="btn btn-ghost btn-sm" id="auth-login-btn">ログイン</button>
          <button type="button" class="btn btn-ghost btn-sm" id="auth-register-btn">新規登録</button>
          <button type="button" class="btn btn-ghost btn-sm" id="auth-logout-btn" style="display: none;">ログアウト</button>
        </div>
      </div>
      <div class="auth-modal" id="auth-modal" style="display: none;" aria-hidden="true">
        <div class="auth-modal-backdrop" id="auth-modal-backdrop"></div>
        <div class="auth-modal-content">
          <h3 class="auth-modal-title" id="auth-modal-title">ログイン</h3>
          <form id="auth-form">
            <label class="auth-field">
              <span>ユーザー名</span>
              <input type="text" id="auth-username" autocomplete="username" required minlength="2">
            </label>
            <label class="auth-field">
              <span>パスワード</span>
              <input type="password" id="auth-password" autocomplete="current-password" required minlength="6">
            </label>
            <p class="auth-error" id="auth-error"></p>
            <div class="auth-modal-actions">
              <button type="button" class="btn btn-ghost" id="auth-modal-cancel">キャンセル</button>
              <button type="submit" class="btn btn-primary" id="auth-submit">ログイン</button>
            </div>
          </form>
        </div>
      </div>
      <div class="manual-modal" id="manual-modal" style="display: none;" aria-hidden="true">
        <div class="manual-modal-backdrop" id="manual-modal-backdrop"></div>
        <div class="manual-modal-content">
          <h3 class="manual-modal-title">手動入力</h3>
          <label class="manual-field">
            <span>曲名で検索</span>
            <input type="text" id="manual-search" placeholder="曲名を入力" autocomplete="off">
          </label>
          <div class="manual-search-results" id="manual-search-results"></div>
          <div class="manual-selected" id="manual-selected" style="display: none;">
            <span class="manual-selected-label">選択中:</span>
            <span id="manual-selected-title"></span>
          </div>
          <label class="manual-field">
            <span>難易度</span>
            <select id="manual-difficulty">
              <option value="easy">EASY</option>
              <option value="normal">NORMAL</option>
              <option value="hard">HARD</option>
              <option value="expert">EXPERT</option>
              <option value="master" selected>MASTER</option>
              <option value="append">APPEND</option>
            </select>
          </label>
          <div class="manual-judgments">
            <label class="manual-judgment"><span>GREAT</span><input type="number" id="manual-great" min="0" value="0"></label>
            <label class="manual-judgment"><span>GOOD</span><input type="number" id="manual-good" min="0" value="0"></label>
            <label class="manual-judgment"><span>BAD</span><input type="number" id="manual-bad" min="0" value="0"></label>
            <label class="manual-judgment"><span>MISS</span><input type="number" id="manual-miss" min="0" value="0"></label>
          </div>
          <p class="manual-error" id="manual-error"></p>
          <div class="manual-modal-actions">
            <button type="button" class="btn btn-ghost" id="manual-modal-cancel">キャンセル</button>
            <button type="button" class="btn btn-primary" id="manual-submit">記録を保存してデータセットに追加</button>
          </div>
        </div>
      </div>
    </header>

    <main class="main-content">
      <!-- Upload Section -->
      <section class="upload-section" id="upload-section">
        <div class="drop-zone" id="drop-zone">
          <input type="file" id="file-input" accept="image/*" multiple class="file-input-overlay" aria-label="画像を選択">
          <div class="drop-zone-content">
            <div class="drop-icon">
              <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                <polyline points="17 8 12 3 7 8" />
                <line x1="12" y1="3" x2="12" y2="15" />
              </svg>
            </div>
            <p class="drop-text">画像をドラッグ＆ドロップ</p>
            <p class="drop-subtext">またはタップして画像を選択</p>
            <p class="drop-hint">PNG, JPG, WEBP 対応 ・ 複数選択可</p>
          </div>
        </div>
      </section>

      <!-- Preview Section -->
      <section class="preview-section" id="preview-section" style="display: none;">
        <div class="section-header">
          <h2 class="section-title">アップロード画像</h2>
          <div class="section-actions">
            <button class="btn btn-ghost" id="clear-btn">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <polyline points="3 6 5 6 21 6" />
                <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" />
              </svg>
              クリア
            </button>
            <button class="btn btn-primary" id="ocr-btn">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <circle cx="11" cy="11" r="8" />
                <line x1="21" y1="21" x2="16.65" y2="16.65" />
              </svg>
              OCR実行
            </button>
          </div>
        </div>
        <div class="preview-grid" id="preview-grid"></div>
      </section>

      <!-- Results Section -->
      <section class="results-section" id="results-section" style="display: none;">
        <div class="section-header">
          <h2 class="section-title">OCR結果</h2>
          <button class="btn btn-ghost" id="copy-all-btn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round">
              <rect x="9" y="9" width="13" height="13" rx="2" ry="2" />
              <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1" />
            </svg>
            すべてコピー
          </button>
        </div>
        <div class="results-list" id="results-list"></div>
      </section>
    </main>

    <footer class="app-footer">
      <p>Powered by <a href="https://github.com/PaddlePaddle/PaddleOCR" target="_blank" rel="noopener">PaddleOCR</a> &
        <a href="https://github.com/naptha/tesseract.js" target="_blank" rel="noopener">Tesseract.js</a></p>
    </footer>

    <script type="module" src="app.js?v=20260319e"></script>
</body>

</html>
