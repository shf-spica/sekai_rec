# 毎日 JST 0:00 頃に sekai-master-db-diff から取得して songDatabase.json を更新し、差分があればコミットして push する。
name: Update song database

on:
  schedule:
    - cron: "0 15 * * *" # 15:00 UTC = 翌 0:00 JST
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch and build songDatabase.json
        run: python build_song_db.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add songDatabase.json
          if git diff --staged --quiet; then
            echo "No changes to songDatabase.json"
          else
            git commit -m "chore: update songDatabase.json"
            git push
          fi
